services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spyfall
      POSTGRES_PASSWORD: spyfall
      POSTGRES_DB: spyfall
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spyfall"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: "postgresql://spyfall:spyfall@postgres:5432/spyfall"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: "postgresql://spyfall:spyfall@postgres:5432/spyfall"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
