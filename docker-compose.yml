services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: spyfall
      POSTGRES_PASSWORD: spyfall
      POSTGRES_DB: spyfall
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://spyfall:spyfall@postgres:5432/spyfall"
    depends_on:
      - postgres

volumes:
  pgdata:
