<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "secondary-fixed": "#c9e7f7",
                        "outline-variant": "#a9b4b7",

                        "on-background": "#2a3437",

                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]

            },

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .lithic-gradient {
            background: linear-gradient(135deg, #456464 0%, #c7e9e8 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col overflow-x-hidden">
<!-- Background Atmospheric Motifs (Asymmetrical) -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute -top-[10%] -right-[20%] w-[80%] h-[60%] rounded-full opacity-20 blur-[120px]" style="background: radial-gradient(circle, #c7e9e8 0%, transparent 70%);"></div>
<div class="absolute bottom-[5%] -left-[10%] w-[60%] h-[50%] rounded-full opacity-10 blur-[100px]" style="background: radial-gradient(circle, #456464 0%, transparent 70%);"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 px-8 pt-16 pb-12 max-w-lg mx-auto w-full">
<!-- Logotype Header -->
<header class="mb-16">
<h1 class="font-headline font-semibold tracking-[0.1em] text-primary uppercase text-sm">
                Spyfall Digital
            </h1>
</header>
<!-- Hero Section -->
<section class="mb-12">
<h2 class="text-[3.5rem] font-headline font-semibold leading-[1.1] tracking-[-0.02em] text-on-background">
                Choose how you want to play
            </h2>
</section>
<!-- Primary Action: Pass & Play -->
<section class="mb-8">
<button class="w-full text-left group transition-all duration-300">
<div class="relative overflow-hidden rounded-[2rem] p-8 min-h-[340px] flex flex-col justify-between shadow-[0_40px_40px_-15px_rgba(42,52,55,0.06)] lithic-gradient">
<!-- Texture Overlay -->
<div class="absolute inset-0 opacity-20 mix-blend-soft-light" data-alt="abstract flowing liquid metal textures with soft reflections and surgical precision depth" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDTQMOMSwiZJbCt5oVsZP7T6zenqfGi649vkYsi6Bbe2511r_v4aHLDdHmPxHn2hOI1V9K2z1LXJKHr92X-bbc0Sc255FzGQSRTna2z6RNmRJjU_UXj-As7Lmknx_Hx6Cx0kn4iaJhak_Q5H637H0RZn9jF0fzAd2Pbp4XP5ZjItM2Xwq3heL9rvA8lrrVbcRQ6csBSgtEH9yedMsr9LQJtfcYylFDXuOA76uNz-OTl8SvjNf5sALIAIQCvCHG3sj74ot61FyWf__Jl'); background-size: cover;">
</div>
<div class="relative z-10">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 backdrop-blur-md text-white text-[10px] font-semibold uppercase tracking-widest mb-6">
<span class="material-symbols-outlined text-[14px]">group</span>
                            Local Session
                        </div>
<h3 class="text-3xl font-headline font-semibold text-white mb-4">Pass &amp; Play</h3>
<p class="text-white/80 text-lg leading-relaxed max-w-[260px]">
                            One shared device. Private handoff moments. Gather your circle and let the whispers begin.
                        </p>
</div>
<div class="relative z-10 self-end">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-primary shadow-lg group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-3xl">arrow_forward</span>
</div>
</div>
</div>
</button>
</section>
<!-- Secondary Action: Online Room -->
<section class="mb-8">
<button class="w-full text-left group">
<div class="glass-card rounded-[2rem] p-6 flex items-center gap-6 shadow-[0_20px_40px_-10px_rgba(42,52,55,0.04)] border border-white/40">
<div class="w-20 h-20 rounded-2xl bg-surface-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-4xl">public</span>
</div>
<div class="flex-1">
<h4 class="text-xl font-headline font-semibold text-on-surface">Online Room</h4>
<p class="text-on-surface-variant text-sm mt-1">Connect with agents across the digital web.</p>
</div>
<div class="text-outline-variant group-hover:translate-x-1 transition-transform">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</button>
</section>
<!-- Tertiary Action: Intel Repository -->
<section class="mt-12 flex justify-center">
<button class="group flex flex-col items-center gap-3">
<div class="w-12 h-12 rounded-full flex items-center justify-center text-outline-variant border border-outline-variant/10 group-hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined">database</span>
</div>
<span class="text-[0.65rem] font-label font-semibold uppercase tracking-[0.15em] text-outline">Intel Repository</span>
<!-- Hover Underline (Tertiary style) -->
<div class="h-[2px] w-0 bg-primary group-hover:w-full transition-all duration-300"></div>
</button>
</section>
<!-- Aesthetic Spacer -->
<div class="h-16"></div>
</main>
<!-- Visual Layering Element (Bottom right asymmetry) -->
<div class="fixed bottom-0 right-0 w-32 h-32 opacity-10 pointer-events-none">
<div class="w-full h-full glass-card rounded-tl-[4rem]"></div>
</div>
</body></html>
